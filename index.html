<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Vetorial | Redirecionando...</title>
    
    <link rel="icon" type="image/png" href="https://app.souvetor.com/static/img/logo.png">
    <link rel="apple-touch-icon" href="https://app.souvetor.com/static/img/logo.png">
    
    <meta http-equiv="refresh" content="0; url=https://app.souvetor.com/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cor-principal: #003366;
            --cor-header: #f9b000;
            --cor-fundo: #f4f7fa;
            --text-main: #333e48;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* --- MARCA D'ÁGUA DO SEU LAYOUT --- */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 35vw;
            height: 35vw;
            max-width: 400px;
            max-height: 400px;
            background-image: url("https://app.souvetor.com/static/img/logo.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.03;
            z-index: -1;
            pointer-events: none;
        }
        body::before { bottom: -5%; left: -5%; transform: rotate(-15deg); }
        body::after { top: 5%; right: -5%; transform: rotate(15deg); }

        /* Estilização dos textos */
        h1 {
            font-family: 'Archivo', sans-serif;
            color: var(--cor-principal);
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        p {
            font-size: 0.95rem;
            color: #5f6d7a;
            margin-top: 0;
        }

        a {
            color: var(--cor-principal);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }
        
        a:hover {
            color: var(--cor-header);
        }

        /* --- LOADER GLOBAL DO SEU LAYOUT (Adaptado para o centro da tela) --- */
        .loader-container {
            position: relative;
            width: 60px;
            height: 60px;
            background-color: var(--cor-principal); /* Alterado para o Azul Vetor para combinar mais com o centro da tela */
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 51, 102, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            z-index: 10;
        }

        .loader-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: rgba(0, 51, 102, 0.4);
            animation: loaderRipple 1.5s infinite ease-out;
            z-index: -1;
        }

        .pulse-loader-img {
            height: 26px;
            width: auto;
            filter: brightness(0) invert(1);
            animation: loaderLogoPulse 1.5s infinite ease-in-out;
        }

        @keyframes loaderRipple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        @keyframes loaderLogoPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .content-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #e1e4e8;
            max-width: 350px;
            width: 90%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <div class="loader-container">
            <img src="https://app.souvetor.com/static/img/logo.png" alt="Logo" class="pulse-loader-img">
        </div>
        
        <h1>Redirecionando...</h1>
        <p>Aguarde um instante.</p>
        <p style="font-size: 0.8rem; margin-top: 20px;">
            <a href="https://app.souvetor.com/">Clique aqui</a> se demorar muito.
        </p>
    </div>

    <script>
        // Pequeno atraso intencional de 300ms só para o usuário não ver um "flash" branco caso a internet seja muito rápida
        setTimeout(function() {
            window.location.replace("https://app.souvetor.com/");
        }, 300);
    </script>
</body>
</html>
