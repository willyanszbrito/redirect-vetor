<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Vetorial | Redirecionando...</title>
    
    <meta http-equiv="refresh" content="0; url=SUA_URL_DE_DESTINO_AQUI">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        /* Spinner de carregamento minimalista */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #007bff;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <p>Redirecionando você...</p>
        <p><small>Se não for redirecionado em instantes, <a id="fallback-link" href="https://app.souvetor.com/">clique aqui</a>.</small></p>
    </div>

    <script>
        const urlDestino = "SUA_URL_DE_DESTINO_AQUI";
        
        // Se quiser que parâmetros da URL original (ex: ?origem=whatsapp) sejam mantidos:
        // const urlDestinoComParams = urlDestino + window.location.search;
        // window.location.href = urlDestinoComParams;
        
        window.location.href = urlDestino;
    </script>
</body>
</html>
